<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLessr - Round Result</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <div id="map" class="fullscreen-map"></div>
    
    <div class="container" style="pointer-events: none; height: 100vh; display: flex; align-items: flex-start; justify-content: center; position: fixed; top: 0; left: 0; width: 100vw; max-width: none;">
        <div class="game-card overlay-card" style="pointer-events: auto; width: 90%;">
            <h1 class="game-title" style="font-size: 2.5rem; margin-bottom: 0.5rem;">{{message}}</h1>
            <h2 style="color: var(--accent-primary); font-size: 1.5rem; margin-bottom: 2rem;">Game: {{media}}</h2>
            
            <p style="color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 0.5rem;">Round Score</p>
            <div class="score-display" style="font-size: 4.5rem;">{{roundscore}}</div>
            
            <script>
                let latuser={{latuser}};
                let lnguser={{lnguser}};
                let latans={{latans}};
                let lngans={{lngans}};
            </script>
            <form method="POST" class="game-form" style="margin-top: 2rem;">
                <div class="btn-group">
                    <button type="submit" name="nextround" class="btn-primary">Next Round</button>
                    <button type="submit" name="clearall" class="btn-danger">Start Fresh</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/postround.js') }}"></script>
</body>
</html>
