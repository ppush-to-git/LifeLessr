<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLessr - Round {{round}}</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>
    <div class="container">
        <div class="game-card">
            <div class="game-header">
                <h2>Round {{round}}</h2>
                <div class="score-badge">Score: {{score}}</div>
            </div>
            
            <div class="game-area-relative">
                <div class="game-image-container">
                    <img src="{{url_for('sendurl',imgpath=image)}}" alt="Guess the location">
                </div>
                <div class="map-container map-mini">
                    <div id="map"></div>
                </div>
            </div>

            <form method="POST" class="game-form">
                <input type="hidden" id="lat" name="lat">
                <input type="hidden" id="lng" name="lng">
                <div class="input-group">
                </div>
                
                <div class="btn-group">
                    <button type="submit" name="submit" class="btn-primary">Check Answer</button>
                    <button type="submit" name="clearall" class="btn-danger">Start Fresh</button>
                </div>
            </form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/map.js') }}"></script>
</body>
</html>
